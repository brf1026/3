<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰 一発逆転スロット</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
body{background:#0d0008;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Hiragino Kaku Gothic Pro','Meiryo',sans-serif;padding:16px}
#wrap{background:#1a0010;border-radius:14px;padding:20px 16px;width:100%;max-width:400px;display:flex;flex-direction:column;align-items:center;gap:14px}
#title{color:#ffd700;font-size:20px;font-weight:500;letter-spacing:3px}
#credit-bar{display:flex;justify-content:space-between;width:100%;font-size:13px;color:rgba(255,255,255,0.5)}
#credit-val{color:#fff;font-weight:500}
#hi-val{color:#ffd700;font-weight:500}
#machine{background:#0d0008;border-radius:12px;border:2px solid #5a003a;width:100%;padding:16px;display:flex;flex-direction:column;align-items:center;gap:12px}
#reels{display:flex;gap:10px}
.reel-wrap{width:84px;height:84px;background:#1f0018;border-radius:8px;border:1px solid #3d0028;overflow:hidden;display:flex;align-items:center;justify-content:center}
.reel{font-size:50px;line-height:1}
.reel.spin{animation:spinReel 0.08s steps(1) infinite}
@keyframes spinReel{0%{transform:translateY(0)}100%{transform:translateY(-5px)}}
#payline{width:100%;height:3px;background:#ff0066;border-radius:2px;opacity:0.6;transition:background 0.3s}
#result-msg{font-size:17px;font-weight:500;color:#fff;height:24px;text-align:center}
#bet-area{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center}
.bet-btn{background:rgba(255,255,255,0.08);border:0.5px solid rgba(255,255,255,0.2);color:#fff;padding:7px 16px;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit}
.bet-btn.active{background:#5a003a;border-color:#ff0066;color:#ffd700}
.bet-btn:active{transform:scale(0.95)}
#spin-btn{width:100%;padding:15px;background:#cc0055;border:none;border-radius:10px;color:#fff;font-size:19px;font-weight:500;cursor:pointer;font-family:inherit;letter-spacing:2px}
#spin-btn:active{transform:scale(0.97);background:#990040}
#spin-btn:disabled{background:#3d0028;color:rgba(255,255,255,0.3);cursor:default;transform:none}
#payout-table{width:100%;background:rgba(0,0,0,0.3);border-radius:8px;padding:10px 14px;font-size:12px;color:rgba(255,255,255,0.5);line-height:2.1}
#payout-table span{color:#ffd700}
#broke-msg{color:#ff6b6b;font-size:13px;text-align:center;display:none}
</style>
</head>
<body>
<div id="wrap">
  <div id="title">🎰 一発逆転スロット</div>
  <div id="credit-bar">
    <div>コイン: <span id="credit-val">100</span></div>
    <div>最高: <span id="hi-val">100</span></div>
  </div>
  <div id="machine">
    <div id="reels">
      <div class="reel-wrap"><div class="reel" id="r0">🍒</div></div>
      <div class="reel-wrap"><div class="reel" id="r1">🍋</div></div>
      <div class="reel-wrap"><div class="reel" id="r2">🍇</div></div>
    </div>
    <div id="payline"></div>
    <div id="result-msg"></div>
  </div>
  <div id="bet-area">
    <span style="font-size:13px;color:rgba(255,255,255,0.5)">BET:</span>
    <button class="bet-btn active" onclick="setBet(5,this)">5</button>
    <button class="bet-btn" onclick="setBet(10,this)">10</button>
    <button class="bet-btn" onclick="setBet(25,this)">25</button>
    <button class="bet-btn" onclick="setBet(50,this)">50</button>
  </div>
  <button id="spin-btn" onclick="spin()">SPIN ▶</button>
  <div id="payout-table">
    🎰🎰🎰 → <span>x50 一発逆転！</span><br>
    💎💎💎 → <span>x30</span> &nbsp; 7️⃣7️⃣7️⃣ → <span>x20</span><br>
    ⭐⭐⭐ → <span>x15</span> &nbsp; 🍒🍒🍒 → <span>x10</span><br>
    🍇🍇🍇 → <span>x8</span> &nbsp; 🍋🍋🍋 → <span>x6</span><br>
    2つ揃い → <span>x2</span> &nbsp; ハズレ → <span>-BET</span>
  </div>
  <div id="broke-msg">💸 コイン切れ！リセットします...</div>
</div>

<script>
const SYMBOLS=['🍒','🍋','🍇','⭐','7️⃣','💎','🎰'];
const WEIGHTS=[35,30,20,8,4,2,1];
const PAYOUTS={'🎰🎰🎰':50,'💎💎💎':30,'7️⃣7️⃣7️⃣':20,'⭐⭐⭐':15,'🍒🍒🍒':10,'🍇🍇🍇':8,'🍋🍋🍋':6};
let credit=100,hiScore=100,bet=5,spinning=false;
const reels=[document.getElementById('r0'),document.getElementById('r1'),document.getElementById('r2')];
const spinBtn=document.getElementById('spin-btn');
const resultMsg=document.getElementById('result-msg');
const creditVal=document.getElementById('credit-val');
const hiVal=document.getElementById('hi-val');
const brokeMsg=document.getElementById('broke-msg');

function setBet(v,el){
  bet=v;
  document.querySelectorAll('.bet-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

function weightedRandom(){
  const total=WEIGHTS.reduce((a,b)=>a+b,0);
  let r=Math.random()*total;
  for(let i=0;i<SYMBOLS.length;i++){r-=WEIGHTS[i];if(r<=0)return SYMBOLS[i];}
  return SYMBOLS[0];
}

function spin(){
  if(spinning)return;
  if(credit<bet){
    brokeMsg.style.display='block';
    setTimeout(()=>{credit=100;updateCredit();brokeMsg.style.display='none';resultMsg.textContent='';},1800);
    return;
  }
  spinning=true;credit-=bet;updateCredit();resultMsg.textContent='';spinBtn.disabled=true;
  reels.forEach(r=>r.classList.add('spin'));
  const results=[];
  reels.forEach((r,i)=>{
    setTimeout(()=>{
      r.classList.remove('spin');
      const sym=weightedRandom();
      results[i]=sym;r.textContent=sym;
      if(i===2)setTimeout(()=>evaluate(results),200);
    },400+i*300);
  });
}

function evaluate(res){
  const key=res.join('');
  let mult=0,msg='';
  if(PAYOUTS[key]){
    mult=PAYOUTS[key];
    if(key==='🎰🎰🎰')msg='🎉 一発逆転！！！';
    else if(mult>=20)msg=`🔥 大当たり！ x${mult}`;
    else msg=`✨ 当たり！ x${mult}`;
    credit+=bet*mult;flash('#ffd700');
  } else {
    const uniq=new Set(res);
    if(uniq.size<3){mult=2;msg='😏 惜しい… x2';credit+=bet*2;flash('#aaaaaa');}
    else{msg='💨 ハズレ';flash('#ff4444');}
  }
  resultMsg.textContent=msg;
  if(credit>hiScore){hiScore=credit;}
  updateCredit();spinning=false;spinBtn.disabled=false;
}

function flash(color){
  const pl=document.getElementById('payline');
  pl.style.background=color;pl.style.opacity='1';
  setTimeout(()=>{pl.style.background='#ff0066';pl.style.opacity='0.6';},500);
}

function updateCredit(){
  creditVal.textContent=credit;
  hiVal.textContent=hiScore;
}
</script>
</body>
</html>
